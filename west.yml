# West manifest file for Microchip ZSDK for Zephyr.

manifest:
  remotes:
    - name: zephyrproject-rtos
      url-base: https://github.com/zephyrproject-rtos
    - name: microchip
      url-base: https://github.com/Zephyr4Microchip

  projects:
    - name: zephyr
      # Zephyr is fetched from the following remote and revision.
      remote: microchip
      repo-path: microchip-zephyr
      revision: 98e54d2f9d7640393641542bfd5bfd0f2a15f60f
      import:
        # These modules are imported from west.yml in Zephyr repository.
        name-allowlist:
          - cmsis-dsp
          - cmsis-nn
          - cmsis_6
          - fatfs
          - littlefs
          - lvgl
          - picolibc
          - segger
          - zcbor
          - hal_atmel
    # Modules in zephyr repository west.yml but excluded from the name-allowlist are defined here.
    - name: hal_microchip
      # Overrides hal_microchip from Zephyr's west.yml with Microchip's version.
      remote: microchip
      repo-path: microchip-hal
      revision: 86f3ea6b389d860332bd81ae8b97543def619395
      path: modules/hal/microchip
  self:
    path: microchip-zsdk
    # Configure west extensions.
    #west-commands: scripts/west-commands.yml
