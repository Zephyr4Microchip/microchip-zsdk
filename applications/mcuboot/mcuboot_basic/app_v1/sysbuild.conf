#
# Sysbuild configuration for MCUboot demo app_v1.
# Enables MCUboot as bootloader with ECDSA-P256 signing and swap-using-move.
#
# Build: west build --sysbuild -b pic32ck_sg01_cult app_v1

SB_CONFIG_BOOTLOADER_MCUBOOT=y
SB_CONFIG_MCUBOOT_MODE_SWAP_USING_MOVE=y
SB_CONFIG_BOOT_SIGNATURE_TYPE_ECDSA_P256=y
SB_CONFIG_MERGED_HEX_FILES=y
