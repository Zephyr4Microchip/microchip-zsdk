# MCUboot Application - Common Configuration
#
# Board-specific settings are in boards/<board>.conf

# Enable MCUboot support - adds 0x200 header offset
CONFIG_BOOTLOADER_MCUBOOT=y

# Enable MCUboot image manager for firmware upgrade state detection
CONFIG_IMG_MANAGER=y

# Enable MCUboot bootutil library for boot_write_img_confirmed()
CONFIG_MCUBOOT_BOOTUTIL_LIB=y

CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_STREAM_FLASH=y

# GPIO for LED control
CONFIG_GPIO=y

# Enable serial console for UART output
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y

# Minimal kernel configuration
CONFIG_MAIN_STACK_SIZE=2048

# Enable system reboot for auto-restart after upgrade request
CONFIG_REBOOT=y
