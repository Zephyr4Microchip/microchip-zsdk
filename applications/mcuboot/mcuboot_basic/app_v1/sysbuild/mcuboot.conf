#
# MCUboot configuration fragment for PIC32CK SG/GC boards.
#
# This file is auto-discovered by sysbuild and MERGED with MCUboot's own
# prj.conf (not replacing it). Only settings that MCUboot upstream does not
# provide or that we need to override are listed here.
#
# Settings already provided by MCUboot prj.conf (DO NOT duplicate):
#   CONFIG_PM=n, CONFIG_MAIN_STACK_SIZE=10240, CONFIG_FLASH=y,
#   CONFIG_LOG=y, CONFIG_LOG_MODE_MINIMAL=y, CONFIG_MCUBOOT_LOG_LEVEL_INF=y,
#   CONFIG_CBPRINTF_NANO=y, CONFIG_PICOLIBC=y
#
# Note: BOOTLOADER_image_default.cmake also forces these in sysbuild mode,
# but they must be set here too for standalone builds (west mcuboot-build).
#
# Key file (CONFIG_BOOT_SIGNATURE_KEY_FILE) defaults automatically from
# MCUboot's Kconfig when ECDSA_P256 is selected: "root-ec-p256.pem"

# --- Boot mode and signature (required for standalone build) ---
CONFIG_BOOT_SWAP_USING_MOVE=y
CONFIG_BOOT_SIGNATURE_TYPE_ECDSA_P256=y

# --- Flash ---
CONFIG_FLASH_MAP=y

# --- Boot behavior ---
CONFIG_BOOT_VALIDATE_SLOT0=y
CONFIG_MCUBOOT_DOWNGRADE_PREVENTION=y
CONFIG_BOOT_BOOTSTRAP=y

# --- Console ---
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_CONSOLE=y

# --- Peripherals ---
CONFIG_GPIO=y

# Required by flash driver (nvmctrl-g3) for ISR synchronization
CONFIG_MULTITHREADING=y

# --- Board-specific (common to all PIC32CK SG/GC boards) ---

# No relocation needed - MCUboot lives entirely in BFM
CONFIG_ROMSTART_RELOCATION_ROM=n

# Vector table relocation: Update VTOR when jumping from BFM to PFM
CONFIG_BOOT_INTR_VEC_RELOC=y

# Sector count: slot0 = 0xFC000 / 0x1000 = 252 sectors.
# Auto-calculation fails because partitions are under the controller node
# (not under a soc-nv-flash node). Set manually with margin.
CONFIG_BOOT_MAX_IMG_SECTORS_AUTO=n
CONFIG_BOOT_MAX_IMG_SECTORS=256
