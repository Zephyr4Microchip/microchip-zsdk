# PIC32CK GC01 Curiosity Ultra board-specific application settings

# App runs from PFM - no relocation needed
CONFIG_ROMSTART_RELOCATION_ROM=n

# MCUboot image signing (ECDSA-P256 test key, matches MCUboot's verification key)
CONFIG_MCUBOOT_SIGNATURE_KEY_FILE="bootloader/mcuboot/root-ec-p256.pem"
